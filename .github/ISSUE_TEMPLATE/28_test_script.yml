name: Test Script
description: Capture details for creating or updating test scripts
type: Test Script
projects: [doublebridge-tech/30, doublebridge-tech/25]
assignees: [HuQiong-DB]
body:
  - type: textarea
    id: purpose
    attributes:
      label: Purpose
      description: Describe the purpose of this test script.
      placeholder: |
    validations:
      required: true
    id: precondistions
    attributes:
      label: Pre-condidtions
      description: List the conditions before the test can start.
      placeholder: |
        1
        2 
    validations:
      required: false
  - type: textarea
    id: steps
    attributes:
      label: Test steps
      description: List the test steps.
      placeholder: |
        1
        2 
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria/Exepcted Results
      description: List the expected results and acceptance criteria this test script must validate.
      placeholder: |
        - 
        - 
    validations:
      required: true
  - type: input
    id: linked_repository
    attributes:
      label: Linked repository
      description: Repository URL or owner/repo name related to this test script.
      placeholder: https://github.com/org/repo or org/repo
    validations:
      required: false
  - type: input
    id: linked_issue
    attributes:
      label: Linked issue
      description: Issue URL or issue key this test script supports.
      placeholder: https://github.com/org/repo/issues/123
    validations:
      required: false
  - type: textarea
    id: linked_test_scripts
    attributes:
      label: Linked test scripts
      description: Link existing test scripts or describe new scripts to be created.
      placeholder: |
        - https://...
        - tests/path/to/script
    validations:
      required: false
