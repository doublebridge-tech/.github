name: Test Script
description: Capture details for creating or updating test scripts
type: Test Script
projects:
  - V8-autotest
assignees: [HuQiong-DB]
body:
  - type: input
    id: linked_repository
    attributes:
      label: Linked repository
      description: Repository URL or owner/repo name related to this test script.
      placeholder: https://github.com/org/repo or org/repo
    validations:
      required: true
  - type: input
    id: linked_issue
    attributes:
      label: Linked issue
      description: Issue URL or issue key this test script supports.
      placeholder: https://github.com/org/repo/issues/123
    validations:
      required: true
  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria
      description: List the acceptance criteria this test script must validate.
      placeholder: |
        - 
        - 
    validations:
      required: true
  - type: textarea
    id: linked_test_scripts
    attributes:
      label: Linked test scripts
      description: Link existing test scripts or describe new scripts to be created.
      placeholder: |
        - https://...
        - tests/path/to/script
    validations:
      required: true
