name: Tech Debt
description: Track and prioritize technical debt for remediation
type: Tech Debt
projects: [doublebridge-tech/30]
assignees: [jimmy-chen-db]
body:
  - type: dropdown
    id: affected_product
    attributes:
      label: Affected products and versions if known
      multiple: true
      options:
        - eCTD Viewer 6.x
        - eCTD Viewer 7.x
        - Viewer app 6.x
        - Viewer app 7.x
        - X-Viewer 8.x
        - eCTD Publisher
        - Enterprise Edition 6.x
    validations:
      required: false
  - type: dropdown
    id: tech_debt_category
    attributes:
      label: Tech debt category
      description: Select all categories that apply.
      multiple: true
      options:
        - Outdated Dependencies
        - Code quality / Readability
        - Missing / Inadequate tests
        - Architecture / Design
        - Dead code / Unused features
        - Performance / Scalability
        - Build / CI / Tooling
        - Documentation gaps
        - Error handling / Logging
        - Database / Schema issues
        - Accessibility / UX debt
        - Configuration / Environment issues
        - Security issues
    validations:
      required: true
  - type: textarea
    id: tech_debt_description
    attributes:
      label: Tech debt description
      description: What the tech debt is and where it lives.
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How much it hurts if left unaddressed.
      multiple: false
      options:
        - Low -- cosmetic or minor inconvenience
        - Medium -- slows development or affects reliability
        - High -- blocks features, causes outages, or is a compliance risk
    validations:
      required: true
  - type: textarea
    id: current_state
    attributes:
      label: Current State
      description: What the code or system looks like today.
    validations:
      required: false
  - type: textarea
    id: desired_state
    attributes:
      label: Desired State
      description: What it should look like after remediation.
    validations:
      required: false
  - type: dropdown
    id: effort
    attributes:
      label: Effort
      description: Rough t-shirt size to resolve.
      multiple: false
      options:
        - Small -- a few hours
        - Medium -- 1-3 days
        - Large -- a week or more
    validations:
      required: false
  - type: textarea
    id: proposed_approach
    attributes:
      label: Proposed Approach
      description: How to tackle this debt.
    validations:
      required: false
  - type: textarea
    id: affected_components
    attributes:
      label: Affected Components
      description: Files, modules, APIs, or infrastructure involved.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links, screenshots, related issues, or other relevant information.
    validations:
      required: false
