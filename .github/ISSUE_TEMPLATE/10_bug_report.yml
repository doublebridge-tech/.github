name: Bug report
description: "Report an interim bug. Note: Customer-reported issues are Defects"
type: Bug
projects: [doublebridge-tech/30]
assignees: [HuQiong-DB]
body:
  - type: textarea
    id: bug_description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps_to_reproduce
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior. Please provide as much detail as possible.
      value: |
        1. 
        2. 
    validations:
      required: false
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: false
  - type: dropdown
    id: product
    attributes:
      label: Product(s) and version if known
      multiple: false
      options:
        - eCTD Viewer 6.x
        - eCTD Viewer 7.x
        - eCTD Viewer 8.x
        - eCTD Publisher 2.x
        - Phoenix Server 6.x
        - Other
    validations:
      required: true
  - type: textarea
    id: screenshots_or_logs
    attributes:
      label: Screenshots or Logs
      description: If applicable, add screenshots or logs to help explain your problem.
    validations:
      required: false
  - type: input
    id: discovered_on_version
    attributes:
      label: Discovered on version
    validations:
      required: false
  - type: textarea
    id: additional_context
    attributes:
      label: Additional context (optional)
      description: Add any other context about the bug here.
    validations:
      required: false
