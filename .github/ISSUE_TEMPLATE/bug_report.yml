name: Bug report
description: Create a report to help us improve
title: "[BUG] "
labels: ["bug"]
assignees: []
body:
  - type: dropdown
    id: product
    attributes:
      label: Product(s) and version if known
      multiple: true
      options:
        - eCTD Viewer 6.x
        - eCTD Viewer 7.x
        - Viewer app 6.x
        - Viewer app 7.x
        - X-Viewer 8.x
        - Enterprise Edition 6.x
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: To Reproduce
      description: Steps to reproduce the behavior.
      value: |
        1. Go to '...'
        2. Click on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: false
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain your problem.
    validations:
      required: false
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. Windows 11, macOS 14
    validations:
      required: false
  - type: input
    id: browser
    attributes:
      label: Browser
      placeholder: e.g. Chrome, Safari
    validations:
      required: false
  - type: input
    id: browser-version
    attributes:
      label: Browser Version
      placeholder: e.g. 22
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false
