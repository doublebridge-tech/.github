# Rule 6: When a PR has the "ai-assisted" label, verify AI disclosure is complete.
#          Used as a required status check in Branch Protection Rules.
#
# Prerequisites:
#   - Add this workflow's check name "AI Disclosure Check" as a required status check
#     in Repository → Settings → Branches → Branch protection rule for "main"
#   - PRs using AI tools must be labeled "ai-assisted"
#   - PR body should contain an "AI Disclosure" section (see template below)
#
# Expected PR body format:
#   ## AI Disclosure
#   - AI Tool: Cursor
#   - AI Scope: Function/Module
#   - AI Disclosure Complete: Yes

name: "AI Disclosure Check"

on:
  pull_request:
    types: [opened, edited, labeled, unlabeled, synchronize]

jobs:
  ai-disclosure-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check AI disclosure
        id: check
        run: |
          PR_LABELS='${{ toJSON(github.event.pull_request.labels.*.name) }}'
          HAS_AI_LABEL=$(echo "$PR_LABELS" | jq 'any(. == "ai-assisted")')

          if [ "$HAS_AI_LABEL" != "true" ]; then
            echo "No 'ai-assisted' label found. Check passed (not AI-assisted)."
            echo "status=pass" >> "$GITHUB_OUTPUT"
            echo "message=Not AI-assisted — no disclosure required." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "PR has 'ai-assisted' label. Checking disclosure..."
          BODY="${{ github.event.pull_request.body }}"

          # Check for AI Disclosure section
          if ! echo "$BODY" | grep -qi "## AI Disclosure"; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
            echo "message=Missing '## AI Disclosure' section in PR body." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for AI Tool
          if ! echo "$BODY" | grep -qi "AI Tool:"; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
            echo "message=Missing 'AI Tool' in AI Disclosure section." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for AI Scope
          if ! echo "$BODY" | grep -qi "AI Scope:"; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
            echo "message=Missing 'AI Scope' in AI Disclosure section." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check for AI Disclosure Complete = Yes
          if ! echo "$BODY" | grep -qiP "AI Disclosure Complete:\s*Yes"; then
            echo "status=fail" >> "$GITHUB_OUTPUT"
            echo "message='AI Disclosure Complete' must be set to 'Yes'." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "status=pass" >> "$GITHUB_OUTPUT"
          echo "message=AI disclosure is complete." >> "$GITHUB_OUTPUT"

      - name: Report result
        run: |
          STATUS="${{ steps.check.outputs.status }}"
          MESSAGE="${{ steps.check.outputs.message }}"

          if [ "$STATUS" == "fail" ]; then
            echo "::error::AI Disclosure Check FAILED: $MESSAGE"
            echo "## AI Disclosure Check Failed" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "$MESSAGE" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Required PR body format:" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "## AI Disclosure" >> "$GITHUB_STEP_SUMMARY"
            echo "- AI Tool: <Cursor | Copilot | Claude Code | ChatGPT | Other>" >> "$GITHUB_STEP_SUMMARY"
            echo "- AI Scope: <None | Refactor | Function/Module | Tests | Docs | Mixed>" >> "$GITHUB_STEP_SUMMARY"
            echo "- AI Disclosure Complete: Yes" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "AI Disclosure Check PASSED: $MESSAGE"
          echo "## AI Disclosure Check Passed" >> "$GITHUB_STEP_SUMMARY"
          echo "$MESSAGE" >> "$GITHUB_STEP_SUMMARY"
