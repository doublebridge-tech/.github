# Rule 5: When a Release is published, auto-set "Released At" for linked Issues
#          and validate traceability completeness.
#
# Prerequisites:
#   - Repository secret: PROJECT_TOKEN (PAT with project read/write scope)
#   - Repository variable: PROJECT_NUMBER (the Project number, e.g. 1)
#   - Repository variable: ORG_NAME (GitHub organization login name)
#   - The Project must have Date field "Released At" and Single-select field "Traceability Status"
#   - Issues should be associated with a Milestone matching the Release tag name

name: "Release Published — Set Released At & Validate Traceability"

on:
  release:
    types: [published]

env:
  GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
  ORG: ${{ vars.ORG_NAME }}
  PROJECT_NUMBER: ${{ vars.PROJECT_NUMBER }}

jobs:
  release-published:
    runs-on: ubuntu-latest
    steps:
      - name: Get Project metadata
        id: project
        run: |
          RESULT=$(gh api graphql -f query='
            query($org: String!, $number: Int!) {
              organization(login: $org) {
                projectV2(number: $number) {
                  id
                  releasedAtField: field(name: "Released At") {
                    ... on ProjectV2Field { id }
                  }
                  stateField: field(name: "State") {
                    ... on ProjectV2SingleSelectField {
                      id
                      options { id name }
                    }
                  }
                }
              }
            }' -f org="$ORG" -F number="$PROJECT_NUMBER")

          echo "project_id=$(echo "$RESULT" | jq -r '.data.organization.projectV2.id')" >> "$GITHUB_OUTPUT"
          echo "released_at_field_id=$(echo "$RESULT" | jq -r '.data.organization.projectV2.releasedAtField.id')" >> "$GITHUB_OUTPUT"
          echo "state_field_id=$(echo "$RESULT" | jq -r '.data.organization.projectV2.stateField.id')" >> "$GITHUB_OUTPUT"
          echo "released_option_id=$(echo "$RESULT" | jq -r '.data.organization.projectV2.stateField.options[] | select(.name == "Released") | .id')" >> "$GITHUB_OUTPUT"

      - name: Find issues in milestone matching release tag
        id: issues
        run: |
          TAG="${{ github.event.release.tag_name }}"
          REPO="${{ github.repository }}"

          # Find milestone by tag name (e.g. v6.5.0 → milestone "v6.5.0" or "6.5.0")
          MILESTONES=$(gh api "repos/$REPO/milestones?state=all&per_page=100")
          MILESTONE_NUM=$(echo "$MILESTONES" | jq -r \
            --arg tag "$TAG" \
            '.[] | select(.title == $tag or .title == ($tag | ltrimstr("v"))) | .number')

          if [ -z "$MILESTONE_NUM" ]; then
            echo "::warning::No milestone found matching tag '$TAG'. Skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Get all closed issues in this milestone
          ISSUES=$(gh api "repos/$REPO/issues?milestone=$MILESTONE_NUM&state=closed&per_page=100" \
            | jq -r '.[].number')
          echo "numbers<<EOF" >> "$GITHUB_OUTPUT"
          echo "$ISSUES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "Found issues: $ISSUES"

      - name: Update Released At and State for each issue
        if: steps.issues.outputs.found == 'true'
        id: update
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          PROJECT_ID="${{ steps.project.outputs.project_id }}"
          RELEASED_AT_FIELD="${{ steps.project.outputs.released_at_field_id }}"
          STATE_FIELD="${{ steps.project.outputs.state_field_id }}"
          RELEASED_OPTION="${{ steps.project.outputs.released_option_id }}"
          INCOMPLETE_ISSUES=""

          while IFS= read -r ISSUE_NUM; do
            [ -z "$ISSUE_NUM" ] && continue
            echo "Processing issue #$ISSUE_NUM..."

            # Get project item ID
            RESULT=$(gh api graphql -f query='
              query($owner: String!, $repo: String!, $issueNumber: Int!) {
                repository(owner: $owner, name: $repo) {
                  issue(number: $issueNumber) {
                    projectItems(first: 20) {
                      nodes {
                        id
                        project { id }
                        traceStatus: fieldValueByName(name: "Traceability Status") {
                          ... on ProjectV2ItemFieldSingleSelectValue { name }
                        }
                      }
                    }
                  }
                }
              }' \
              -f owner="$ORG" \
              -f repo="${{ github.event.repository.name }}" \
              -F issueNumber="$ISSUE_NUM")

            ITEM_ID=$(echo "$RESULT" | jq -r \
              --arg pid "$PROJECT_ID" \
              '.data.repository.issue.projectItems.nodes[] | select(.project.id == $pid) | .id')

            TRACE_STATUS=$(echo "$RESULT" | jq -r \
              --arg pid "$PROJECT_ID" \
              '.data.repository.issue.projectItems.nodes[] | select(.project.id == $pid) | .traceStatus.name // "null"')

            if [ -z "$ITEM_ID" ]; then
              echo "  Issue #$ISSUE_NUM not in project, skipping."
              continue
            fi

            # Check traceability
            if [ "$TRACE_STATUS" != "Complete" ] && [ "$TRACE_STATUS" != "Exception Approved" ]; then
              INCOMPLETE_ISSUES="$INCOMPLETE_ISSUES #$ISSUE_NUM($TRACE_STATUS)"
              echo "  WARNING: Traceability incomplete for #$ISSUE_NUM (status: $TRACE_STATUS)"
            fi

            # Set Released At
            gh api graphql -f query='
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $date: Date!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId, itemId: $itemId, fieldId: $fieldId
                  value: { date: $date }
                }) { projectV2Item { id } }
              }' \
              -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" \
              -f fieldId="$RELEASED_AT_FIELD" -f date="$TODAY"

            # Set State = Released
            gh api graphql -f query='
              mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId, itemId: $itemId, fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) { projectV2Item { id } }
              }' \
              -f projectId="$PROJECT_ID" -f itemId="$ITEM_ID" \
              -f fieldId="$STATE_FIELD" -f optionId="$RELEASED_OPTION"

            echo "  Set Released At=$TODAY, State=Released for #$ISSUE_NUM"
          done <<< "${{ steps.issues.outputs.numbers }}"

          echo "incomplete=$INCOMPLETE_ISSUES" >> "$GITHUB_OUTPUT"

      - name: Report traceability warnings
        if: steps.update.outputs.incomplete
        run: |
          echo "::warning::The following issues have incomplete traceability: ${{ steps.update.outputs.incomplete }}"
          echo "## Traceability Warning" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "The following issues were released with incomplete traceability:" >> "$GITHUB_STEP_SUMMARY"
          echo "${{ steps.update.outputs.incomplete }}" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Please review and update their **Traceability Status** in the Project." >> "$GITHUB_STEP_SUMMARY"
